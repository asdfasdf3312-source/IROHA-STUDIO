<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>보유 중인 아바타</title>

  <style>
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --mint: #76d8d2;
      --mint-dark: #4eaaa5;
      --mint-pale: #edf9f8;
      --border: #b4e5e1;
      --text: #333333;
      --text-light: #8a9a9a;
      --white-glass: rgba(255, 255, 255, 0.96);
      --shadow-sm: 0 4px 14px rgba(78, 170, 165, 0.10);
      --shadow-md: 0 16px 42px rgba(78, 170, 165, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
    }

    body {
      padding: 34px 16px 42px;
      color: var(--text);
      font-family: 'Paperozi', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    .section {
      width: 100%;
      max-width: 850px;
      margin: 0 auto;
      padding: 40px;
      border: 1.5px solid var(--border);
      border-radius: 32px;
      background: var(--white-glass);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .sec-header {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 24px;
    }

    .sec-bar {
      width: 5px;
      height: 22px;
      flex: 0 0 5px;
      border-radius: 999px;
      background: var(--mint);
    }

    .sec-title {
      font-size: 23px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .sec-subtitle {
      margin-left: 2px;
      color: var(--text-light);
      font-size: 12.5px;
      font-weight: 400;
      line-height: 1.55;
      white-space: normal;
    }

    .scroll-grid {
      display: flex;
      gap: 12px;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 0 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
      overscroll-behavior-inline: contain;
      touch-action: pan-y;
    }

    .scroll-grid.dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .scroll-grid::-webkit-scrollbar {
      height: 6px;
    }

    .scroll-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    .scroll-grid::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: var(--mint);
    }

    .img-card {
      position: relative;
      height: 360px;
      flex: 0 0 auto;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: var(--mint-pale);
      box-shadow: var(--shadow-sm);
      scroll-snap-align: start;
      cursor: zoom-in;
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        border-color 0.25s ease;
    }

    .img-card:hover {
      transform: translateY(-3px);
      border-color: var(--mint);
      box-shadow: 0 10px 24px rgba(78, 170, 165, 0.15);
    }

    .img-card img {
      display: block;
      width: auto;
      height: 100%;
      max-width: none;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .card-skeleton {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(
          90deg,
          rgba(226, 249, 247, 0.75) 25%,
          rgba(255, 255, 255, 0.92) 50%,
          rgba(226, 249, 247, 0.75) 75%
        );
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    .card-skeleton.hide {
      display: none;
    }

    .notice {
      margin: 15px 0 0;
      color: var(--text-light);
      font-size: 13.5px;
      font-weight: 700;
      line-height: 1.6;
      text-align: center;
    }


    .lightbox[hidden] {
      display: none !important;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(240, 250, 249, 0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .lightbox-image {
      display: block;
      max-width: min(97vw, 1500px);
      max-height: 93vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      cursor: zoom-in;
      user-select: none;
      -webkit-user-drag: none;
      transition:
        width 0.28s ease,
        max-width 0.28s ease,
        max-height 0.28s ease;
    }

    .lightbox-image.zoomed {
      width: min(150vw, 2100px);
      max-width: none;
      max-height: none;
      cursor: zoom-out;
    }

    .lightbox.zoom-mode {
      align-items: flex-start;
      justify-content: flex-start;
      overflow: auto;
      padding: 70px 28px 90px;
    }

    .lightbox.zoom-mode .lightbox-image {
      margin: 0 auto;
    }

    .lightbox-close,
    .lightbox-nav {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      color: #ffffff;
      background: rgba(118, 216, 210, 0.94);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition:
        transform 0.2s ease,
        background-color 0.2s ease;
    }

    .lightbox-close:hover,
    .lightbox-nav:hover {
      transform: scale(1.06);
      background: var(--mint-dark);
    }

    .lightbox-close {
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 26px;
      line-height: 1;
    }

    .lightbox-nav {
      top: 50%;
      width: 48px;
      height: 64px;
      border-radius: 16px;
      font-size: 30px;
      transform: translateY(-50%);
    }

    .lightbox-nav:hover {
      transform: translateY(-50%) scale(1.06);
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    .lightbox-count {
      position: absolute;
      left: 50%;
      bottom: 17px;
      transform: translateX(-50%);
      padding: 7px 13px;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(78, 170, 165, 0.92);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    body.lightbox-open {
      overflow: hidden;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 14px 34px;
      }

      .section {
        padding: 24px 18px;
        border-radius: 22px;
      }

      .sec-header {
        margin-bottom: 18px;
        flex-wrap: wrap;
      }

      .sec-title {
        font-size: 20px;
      }

      .sec-subtitle {
        width: 100%;
        margin-left: 16px;
        margin-top: -4px;
        font-size: 12px;
        white-space: normal;
      }

      .img-card {
        height: 280px;
        border-radius: 16px;
      }

      .lightbox {
        padding: 64px 14px 52px;
      }

      .lightbox-image {
        max-width: 96vw;
        max-height: 86vh;
        border-radius: 14px;
      }

      .lightbox-image.zoomed {
        width: 185vw;
      }

      .lightbox.zoom-mode {
        padding: 64px 12px 84px;
      }

      .lightbox-close {
        top: 12px;
        right: 12px;
      }

      .lightbox-nav {
        top: auto;
        bottom: 10px;
        width: 46px;
        height: 42px;
        transform: none;
      }

      .lightbox-nav:hover {
        transform: scale(1.06);
      }

      .lightbox-prev {
        left: calc(50% - 58px);
      }

      .lightbox-next {
        right: calc(50% - 58px);
      }

      .lightbox-count {
        bottom: 58px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .img-card,
      .card-skeleton {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <section class="section" aria-label="보유 중인 아바타">
    <div class="sec-header">
      <div class="sec-bar" aria-hidden="true"></div>
      <h1 class="sec-title">보유 중인 아바타</h1>
      <span class="sec-subtitle">🔎 이미지를 두 번 클릭해 확대해보세요!<br>확인한 아바타 영문명을 BOOTH에 검색하면 빠르게 찾을 수 있습니다.</span>
    </div>

    <div
      id="owned-chars-grid"
      class="scroll-grid"
      aria-label="보유 아바타 이미지 목록"
    >
      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-01.png"
          alt="보유 아바타 1"
          loading="eager"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-02.png"
          alt="보유 아바타 2"
          loading="eager"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-03.png"
          alt="보유 아바타 3"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-04.png"
          alt="보유 아바타 4"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-05.png"
          alt="보유 아바타 5"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-06.png"
          alt="보유 아바타 6"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-07.png"
          alt="보유 아바타 7"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-08.png"
          alt="보유 아바타 8"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-09.png"
          alt="보유 아바타 9"
          loading="lazy"
        >
      </div>

      <div class="img-card">
        <div class="card-skeleton"></div>
        <img
          src="./images/avatar-10.png"
          alt="보유 아바타 10"
          loading="lazy"
        >
      </div>
    </div>

    <p class="notice">
      ※ 일부 아바타는 방송 및 수익 활동이 제한될 수 있으므로, 구매 전 반드시 해당 상품의 이용 약관을 확인해주세요.
    </p>
  </section>


  <div
    id="avatar-lightbox"
    class="lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="아바타 이미지 크게 보기"
    hidden
  >
    <button
      class="lightbox-close"
      type="button"
      aria-label="닫기"
    >
      ×
    </button>

    <button
      class="lightbox-nav lightbox-prev"
      type="button"
      aria-label="이전 이미지"
    >
      ‹
    </button>

    <img
      class="lightbox-image"
      src=""
      alt=""
    >

    <button
      class="lightbox-nav lightbox-next"
      type="button"
      aria-label="다음 이미지"
    >
      ›
    </button>

    <div class="lightbox-count" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      const grid = document.getElementById('owned-chars-grid');
      const images = Array.from(grid.querySelectorAll('img'));
      const cards = Array.from(grid.querySelectorAll('.img-card'));
      const lightbox = document.getElementById('avatar-lightbox');
      const lightboxImage = lightbox.querySelector('.lightbox-image');
      const lightboxClose = lightbox.querySelector('.lightbox-close');
      const lightboxPrev = lightbox.querySelector('.lightbox-prev');
      const lightboxNext = lightbox.querySelector('.lightbox-next');
      const lightboxCount = lightbox.querySelector('.lightbox-count');

      let isDragging = false;
      let startX = 0;
      let startScrollLeft = 0;
      let moved = false;
      let pressedCard = null;
      let currentImageIndex = 0;
      let lastFocusedCard = null;

      function updateLightbox(index) {
        currentImageIndex =
          (index + images.length) % images.length;

        const image = images[currentImageIndex];
        lightboxImage.src = image.currentSrc || image.src;
        lightboxImage.alt = image.alt || '보유 아바타 이미지';
        lightboxCount.textContent =
          (currentImageIndex + 1) + ' / ' + images.length;
      }

      function openLightbox(index, card) {
        lastFocusedCard = card || null;
        updateLightbox(index);
        lightboxImage.classList.remove('zoomed');
        lightbox.classList.remove('zoom-mode');
        lightbox.hidden = false;
        document.body.classList.add('lightbox-open');
        lightboxClose.focus();
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxImage.src = '';
        lightboxImage.classList.remove('zoomed');
        lightbox.classList.remove('zoom-mode');
        document.body.classList.remove('lightbox-open');

        if (lastFocusedCard) {
          lastFocusedCard.focus();
        }
      }

      cards.forEach(function (card, index) {
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute(
          'aria-label',
          '보유 아바타 ' + (index + 1) + ' 크게 보기'
        );

        card.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openLightbox(index, card);
          }
        });
      });

      lightboxClose.addEventListener('click', closeLightbox);

      lightboxPrev.addEventListener('click', function () {
        lightboxImage.classList.remove('zoomed');
        lightbox.classList.remove('zoom-mode');
        updateLightbox(currentImageIndex - 1);
      });

      lightboxNext.addEventListener('click', function () {
        lightboxImage.classList.remove('zoomed');
        lightbox.classList.remove('zoom-mode');
        updateLightbox(currentImageIndex + 1);
      });

      lightboxImage.addEventListener('click', function (event) {
        event.stopPropagation();

        const willZoom =
          !lightboxImage.classList.contains('zoomed');

        lightboxImage.classList.toggle('zoomed', willZoom);
        lightbox.classList.toggle('zoom-mode', willZoom);

        if (!willZoom) {
          lightbox.scrollTo({
            top: 0,
            left: 0,
            behavior: 'smooth'
          });
        }
      });

      lightbox.addEventListener('click', function (event) {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener('keydown', function (event) {
        if (lightbox.hidden) {
          return;
        }

        if (event.key === 'Escape') {
          closeLightbox();
        } else if (event.key === 'ArrowLeft') {
          lightboxImage.classList.remove('zoomed');
          lightbox.classList.remove('zoom-mode');
          updateLightbox(currentImageIndex - 1);
        } else if (event.key === 'ArrowRight') {
          lightboxImage.classList.remove('zoomed');
          lightbox.classList.remove('zoom-mode');
          updateLightbox(currentImageIndex + 1);
        }
      });

      function sendHeight() {
        const height = Math.ceil(
          Math.max(
            document.body.scrollHeight,
            document.documentElement.scrollHeight
          )
        );

        window.parent.postMessage(
          {
            type: 'iroha-avatar-height',
            height: height
          },
          '*'
        );
      }

      images.forEach(function (image) {
        const skeleton =
          image.parentElement.querySelector('.card-skeleton');

        function finishLoading() {
          image.classList.add('loaded');

          if (skeleton) {
            skeleton.classList.add('hide');
          }

          sendHeight();
        }

        if (image.complete) {
          finishLoading();
        } else {
          image.addEventListener('load', finishLoading, { once: true });
          image.addEventListener(
            'error',
            function () {
              if (skeleton) {
                skeleton.classList.add('hide');
              }
            },
            { once: true }
          );
        }
      });

      grid.addEventListener('pointerdown', function (event) {
        if (event.pointerType === 'mouse' && event.button !== 0) {
          return;
        }

        isDragging = true;
        moved = false;
        pressedCard = event.target.closest('.img-card');
        startX = event.clientX;
        startScrollLeft = grid.scrollLeft;
      });

      grid.addEventListener('pointermove', function (event) {
        if (!isDragging) {
          return;
        }

        const distance = event.clientX - startX;

        if (!moved && Math.abs(distance) > 5) {
          moved = true;
          grid.classList.add('dragging');

          if (
            event.pointerId !== undefined &&
            !grid.hasPointerCapture(event.pointerId)
          ) {
            grid.setPointerCapture(event.pointerId);
          }
        }

        if (moved) {
          grid.scrollLeft = startScrollLeft - distance;
          event.preventDefault();
        }
      });

      function stopDragging(event, openWhenClicked) {
        if (!isDragging) {
          return;
        }

        const cardToOpen = !moved && openWhenClicked
          ? pressedCard
          : null;

        isDragging = false;
        grid.classList.remove('dragging');

        if (
          event &&
          event.pointerId !== undefined &&
          grid.hasPointerCapture(event.pointerId)
        ) {
          grid.releasePointerCapture(event.pointerId);
        }

        pressedCard = null;

        if (cardToOpen) {
          const index = cards.indexOf(cardToOpen);

          if (index !== -1) {
            openLightbox(index, cardToOpen);
          }
        }

        moved = false;
      }

      grid.addEventListener('pointerup', function (event) {
        stopDragging(event, true);
      });

      grid.addEventListener('pointercancel', function (event) {
        stopDragging(event, false);
      });

      grid.addEventListener('lostpointercapture', function (event) {
        stopDragging(event, false);
      });

      grid.addEventListener(
        'wheel',
        function (event) {
          if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) {
            return;
          }

          grid.scrollLeft += event.deltaY;
          event.preventDefault();
        },
        { passive: false }
      );

      grid.addEventListener('dragstart', function (event) {
        event.preventDefault();
      });

      window.addEventListener('load', function () {
        sendHeight();
        setTimeout(sendHeight, 250);
        setTimeout(sendHeight, 800);
      });

      window.addEventListener('resize', sendHeight);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(sendHeight);
      }

      if ('ResizeObserver' in window) {
        const observer = new ResizeObserver(sendHeight);
        observer.observe(document.body);
      }
    })();
  </script>
</body>
</html>
