<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>뽀잉눈｜웃는눈 연동｜페이셜｜성형 v41</title>
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://www.youtube-nocookie.com">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://www.google.com">

  <style>
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --mint: #76d8d2;
      --mint-dark: #4eaaa5;
      --mint-pale: #edf9f8;
      --border: #b4e5e1;
      --text: #333333;
      --text-light: #819392;
      --white: rgba(255, 255, 255, 0.97);
      --shadow-sm: 0 5px 16px rgba(78, 170, 165, 0.10);
      --shadow-md: 0 16px 42px rgba(78, 170, 165, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
    }

    body {
      padding: 34px 16px 42px;
      color: var(--text);
      font-family: 'Paperozi', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    .section {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px;
      border: 1.5px solid var(--border);
      border-radius: 32px;
      background: var(--white);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .sec-header {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .sec-bar {
      width: 5px;
      height: 22px;
      flex: 0 0 5px;
      border-radius: 999px;
      background: var(--mint);
    }

    .sec-title {
      margin: 0;
      color: var(--text);
      font-size: 23px;
      font-weight: 700;
      line-height: 1.3;
    }

    .sec-subtitle {
      margin-left: 2px;
      color: var(--text-light);
      font-size: 12.5px;
      font-weight: 400;
      line-height: 1.55;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .filter-btn {
      min-width: 88px;
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: var(--text-light);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition:
        background-color 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .filter-btn:hover {
      transform: translateY(-1px);
      border-color: var(--mint);
      color: var(--mint-dark);
    }

    .filter-btn.active {
      border-color: var(--mint);
      background: var(--mint);
      color: #ffffff;
      box-shadow: 0 7px 18px rgba(78, 170, 165, 0.18);
    }

    .portfolio-notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: -4px 0 22px;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-left: 5px solid var(--mint);
      border-radius: 16px;
      background: var(--mint-pale);
      color: var(--text-light);
      font-size: 12.8px;
      font-weight: 400;
      line-height: 1.7;
    }

    .portfolio-notice-icon {
      flex: 0 0 auto;
      margin-top: 1px;
      color: var(--mint-dark);
      font-size: 15px;
      line-height: 1.5;
    }

    .portfolio-notice strong {
      color: var(--mint-dark);
      font-weight: 700;
    }
.portfolio-grid {
      display: flex;
      gap: 14px;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 0 12px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-inline: contain;
      touch-action: pan-y;
      cursor: grab;
      user-select: none;
    }

    .portfolio-grid.dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .portfolio-grid::-webkit-scrollbar {
      height: 6px;
    }

    .portfolio-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    .portfolio-grid::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: var(--mint);
    }

    .portfolio-card {
      position: relative;
      flex: 0 0 auto;
      width: min(78vw, 560px);
      height: 380px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      border-radius: 22px;
      background: var(--mint-pale);
      box-shadow: var(--shadow-sm);
      scroll-snap-align: start;
      cursor: zoom-in;
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        border-color 0.25s ease;
    }

    .portfolio-card:hover {
      transform: translateY(-3px);
      border-color: var(--mint);
      box-shadow: 0 12px 26px rgba(78, 170, 165, 0.15);
    }

    .portfolio-card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      -webkit-user-drag: none;
    }


    .portfolio-card.youtube-embed-card {
      cursor: default;
      background: #000000;
      border-color: rgba(118, 216, 210, 0.88);
    }

    .portfolio-card.youtube-embed-card:hover {
      transform: translateY(-3px);
      border-color: var(--mint);
      box-shadow: 0 12px 26px rgba(78, 170, 165, 0.15);
    }

    .portfolio-card.youtube-embed-card iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000000;
    }

    .portfolio-card.youtube-embed-card .portfolio-badge {
      display: none;
    }

    .portfolio-card.video-card:not(.youtube-embed-card)::after {
      content: '▶';
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 3;
      width: 62px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      background: rgba(78, 170, 165, 0.92);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.20);
      font-size: 24px;
      line-height: 1;
      padding-left: 4px;
      pointer-events: none;
    }

    .portfolio-card.video-card:not(.youtube-embed-card)::before {
      content: 'VIDEO';
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 3;
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--mint-dark);
      background: rgba(255, 255, 255, 0.90);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.10);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1;
      pointer-events: none;
    }

    .portfolio-badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 2;
      padding: 8px 12px;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(78, 170, 165, 0.92);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.12);
    }

    .empty-state {
      width: 100%;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 34px 20px;
      border: 1.5px dashed var(--border);
      border-radius: 22px;
      background: var(--mint-pale);
      text-align: center;
    }

    .empty-icon {
      font-size: 34px;
      line-height: 1;
    }

    .empty-title {
      color: var(--mint-dark);
      font-size: 17px;
      font-weight: 700;
    }

    .empty-text {
      color: var(--text-light);
      font-size: 13px;
      line-height: 1.6;
    }

    .lightbox[hidden] {
      display: none !important;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow: auto;
      scroll-behavior: auto;
      overscroll-behavior: contain;
      background: rgba(240, 250, 249, 0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 1;
      transition: opacity 0.18s ease;
    }

    .lightbox.is-opening {
      opacity: 0;
    }

    .lightbox-image {
      display: block;
      max-width: min(calc(100vw - 48px), 1500px);
      max-height: calc(100vh - 86px);
      width: auto;
      height: auto;
      object-fit: contain;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.25);
      cursor: zoom-in;
      user-select: none;
      -webkit-user-drag: none;
      transition:
        opacity 0.24s ease,
        transform 0.48s cubic-bezier(0.22, 0.76, 0.28, 1),
        width 0.28s ease,
        max-width 0.28s ease,
        max-height 0.28s ease;
    }

    .lightbox-image.slide-enter-left {
      opacity: 1;
      transform: translateX(-30px) scale(0.997);
      transition: none;
    }

    .lightbox-image.slide-enter-right {
      opacity: 1;
      transform: translateX(30px) scale(0.997);
      transition: none;
    }

    .lightbox-image.zoomed {
      width: min(165vw, 2200px);
      max-width: none;
      max-height: none;
      cursor: grab;
      touch-action: none;
      transform: none !important;
      opacity: 1 !important;
      filter: none !important;
      will-change: scroll-position;
    }

    .lightbox.zoom-active {
      display: block;
      text-align: center;
      align-items: initial;
      justify-content: initial;
    }

    .lightbox.zoom-active .lightbox-image.zoomed {
      display: block;
      margin: 72px auto 120px;
    }

    .lightbox-image.zoomed.dragging {
      cursor: grabbing;
    }

    .lightbox.zoom-active .lightbox-nav {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .lightbox-close,
    .lightbox-nav {
      position: fixed;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      color: #ffffff;
      background: rgba(118, 216, 210, 0.95);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition:
        opacity 0.2s ease,
        visibility 0.2s ease,
        background-color 0.2s ease;
    }

    .lightbox-close {
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 26px;
    }

    .lightbox-nav {
      top: 50%;
      width: 48px;
      height: 64px;
      border-radius: 16px;
      transform: translateY(-50%);
      font-size: 30px;
    }

    .lightbox-prev {
      left: 20px;
    }

    .lightbox-next {
      right: 20px;
    }

    .lightbox-guide {
      position: fixed;
      left: 50%;
      bottom: 52px;
      z-index: 2;
      transform: translateX(-50%);
      max-width: calc(100vw - 40px);
      padding: 9px 14px;
      border: 1px solid rgba(180, 229, 225, 0.95);
      border-radius: 999px;
      color: var(--mint-dark);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 7px 20px rgba(78, 170, 165, 0.14);
      font-size: 12.5px;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }


    .lightbox.video-mode {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow: hidden;
    }

    .lightbox-video-wrap {
      position: relative;
      z-index: 5;
      width: min(94vw, 1180px);
      aspect-ratio: 16 / 9;
      display: block;
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      overflow: hidden;
      background: #000000;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.25);
    }

    .lightbox-video-wrap[hidden] {
      display: none !important;
    }

    .lightbox.video-mode .lightbox-video-wrap {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .lightbox-video-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000000;
    }

    .video-fallback-link {
      position: absolute;
      left: 50%;
      bottom: -46px;
      transform: translateX(-50%);
      z-index: 6;
      padding: 10px 16px;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(78, 170, 165, 0.95);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
    }

    .video-fallback-link[hidden] {
      display: none !important;
    }

    .lightbox.video-mode .lightbox-image,
    .lightbox.video-mode .lightbox-guide {
      display: none !important;
    }

    .lightbox-count {
      position: fixed;
      left: 50%;
      bottom: 17px;
      z-index: 2;
      transform: translateX(-50%);
      padding: 7px 13px;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(78, 170, 165, 0.92);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    body.lightbox-open {
      overflow: hidden;
    }


    /* 확대 이미지를 드래그해도 안내 문구와 번호가 화면 하단 중앙에 고정되도록 보정 */
    .lightbox {
      --iroha-scroll-left: 0px;
      --iroha-scroll-top: 0px;
    }

    .lightbox .lightbox-guide {
      position: fixed !important;
      left: 50vw !important;
      right: auto !important;
      bottom: 52px !important;
      transform: translate3d(calc(-50% + var(--iroha-scroll-left, 0px)), var(--iroha-scroll-top, 0px), 0) !important;
      z-index: 10020 !important;
      margin: 0 !important;
      pointer-events: none !important;
    }

    .lightbox .lightbox-count {
      position: fixed !important;
      left: 50vw !important;
      right: auto !important;
      bottom: 17px !important;
      transform: translate3d(calc(-50% + var(--iroha-scroll-left, 0px)), var(--iroha-scroll-top, 0px), 0) !important;
      z-index: 10021 !important;
      margin: 0 !important;
      pointer-events: none !important;
    }

    .lightbox.video-mode .lightbox-count {
      display: none !important;
    }

    @media (max-width: 640px) {
      .lightbox .lightbox-guide {
        left: 50vw !important;
        bottom: 104px !important;
        width: calc(100vw - 28px) !important;
        max-width: calc(100vw - 28px) !important;
        white-space: normal !important;
      }

      .lightbox .lightbox-count {
        left: 50vw !important;
        bottom: 58px !important;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 14px 34px;
      }

      .section {
        padding: 24px 18px;
        border-radius: 22px;
      }

      .sec-title {
        font-size: 20px;
      }

      .sec-subtitle {
        width: 100%;
        margin-left: 16px;
        margin-top: -4px;
        font-size: 12px;
      }

      .filter-btn {
        min-width: auto;
        padding: 9px 14px;
        font-size: 13px;
      }

      .portfolio-notice {
        margin-bottom: 18px;
        padding: 12px 13px;
        font-size: 12px;
      }

      .portfolio-card {
        width: 84vw;
        height: 300px;
        border-radius: 17px;
      }

      .lightbox-nav {
        top: auto;
        bottom: 10px;
        width: 46px;
        height: 42px;
        transform: none;
      }

      .lightbox-prev {
        left: calc(50% - 58px);
      }

      .lightbox-next {
        right: calc(50% - 58px);
      }

      .lightbox-guide {
        bottom: 104px;
        width: calc(100vw - 28px);
        padding: 8px 11px;
        border-radius: 14px;
        font-size: 11.5px;
        white-space: normal;
      }

      .lightbox-count {
        bottom: 58px;
      }

      .lightbox-image.zoomed {
        width: 180vw;
      }

      .lightbox.zoom-active .lightbox-image.zoomed {
        margin: 70px auto 118px;
      }
    }
  </style>
</head>

<body>
  <section class="section" aria-label="뽀잉눈｜웃는눈 연동｜페이셜｜성형">
    <div class="sec-header">
      <div class="sec-bar" aria-hidden="true"></div>
      <h1 class="sec-title">뽀잉눈｜웃는눈 연동｜페이셜｜성형</h1>
      <span class="sec-subtitle">
        🔎 이미지는 두 번 클릭해 확대하고, 영상은 바로 재생할 수 있어요!
      </span>
    </div>

    <div class="filter-bar" role="tablist" aria-label="작업 분류">
      <button class="filter-btn active" type="button" data-filter="all">
        전체
      </button>
      <button class="filter-btn" type="button" data-filter="boing-eye">
        뽀잉눈
      </button>
      <button class="filter-btn" type="button" data-filter="smile-eye">
        웃는눈 연동
      </button>
      <button class="filter-btn" type="button" data-filter="facial">
        페이셜
      </button>
      <button class="filter-btn" type="button" data-filter="detail">
        성형디테일
      </button>
    </div>
<div class="portfolio-notice" role="note" aria-label="작업 기준 안내">
      <div class="portfolio-notice-icon">※</div>
      <div>
        <strong>Blender를 활용한 페이셜 성형·쉐이프키 디테일</strong> 작업 예시입니다.<br>
        아바타 구조에 따라 작업 가능 범위가 달라질 수 있으며, 세부 내용은 상담 후 안내드립니다.
      </div>
    </div>

    <div id="face-portfolio-grid" class="portfolio-grid"></div>
  </section>

  <div
    id="face-portfolio-lightbox"
    class="lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="작업 이미지 크게 보기"
    hidden
  >
    <button class="lightbox-close" type="button" aria-label="닫기">×</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="이전 이미지">‹</button>
    <img class="lightbox-image" src="" alt="">

    <div class="lightbox-video-wrap" hidden>
      <iframe
        class="lightbox-video"
        src=""
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
      <a
        class="video-fallback-link"
        href="https://youtu.be/dAcdmztELK0"
        target="_blank"
        rel="noopener noreferrer"
        hidden
      >
        YouTube에서 보기
      </a>
    </div>
    <button class="lightbox-nav lightbox-next" type="button" aria-label="다음 이미지">›</button>

    <div class="lightbox-guide">
      🖱️ 확대 후 이미지를 누른 채 드래그하면 원하는 부분을 볼 수 있습니다.
    </div>

    <div class="lightbox-count" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      const portfolioItems = [
        {
          src: 'https://img.youtube.com/vi/wY3I8bUxnUM/hqdefault.jpg',
          category: 'smile-eye',
          title: '웃는눈 연동 샘플',
          type: 'youtube',
          youtubeId: 'wY3I8bUxnUM'
        },
        {
          src: 'https://img.youtube.com/vi/dAcdmztELK0/hqdefault.jpg',
          category: 'boing-eye',
          title: '뽀잉눈 움직임 샘플',
          type: 'youtube',
          youtubeId: 'dAcdmztELK0'
        },
        {
          src: 'https://img.youtube.com/vi/pFfbLfAzeqQ/hqdefault.jpg',
          category: 'facial',
          title: '페이셜 움직임 샘플',
          type: 'youtube',
          youtubeId: 'pFfbLfAzeqQ'
        },
        {
          src: './images/portfolio/blender-shapekey-face-06.png',
          category: 'detail',
          title: '성형 디테일 1'
        },
        {
          src: './images/portfolio/blender-shapekey-face-01.png',
          category: 'detail',
          title: '성형 디테일 2'
        },
        {
          src: './images/portfolio/blender-shapekey-face-02.png',
          category: 'detail',
          title: '성형 디테일 3'
        },
        {
          src: './images/portfolio/blender-shapekey-face-03.png',
          category: 'detail',
          title: '성형 디테일 4'
        },
        {
          src: './images/portfolio/blender-shapekey-face-04.png',
          category: 'detail',
          title: '성형 디테일 5'
        },
        {
          src: './images/portfolio/blender-shapekey-face-05.png',
          category: 'detail',
          title: '성형 디테일 6'
        }
      ];

      const grid = document.getElementById('face-portfolio-grid');
      const filterButtons = Array.from(
        document.querySelectorAll('.filter-btn')
      );

      const lightbox = document.getElementById('face-portfolio-lightbox');
      const lightboxImage = lightbox.querySelector('.lightbox-image');
      const lightboxVideoWrap = lightbox.querySelector('.lightbox-video-wrap');
      const lightboxVideo = lightbox.querySelector('.lightbox-video');
      const videoFallbackLink = lightbox.querySelector('.video-fallback-link');
      const lightboxClose = lightbox.querySelector('.lightbox-close');
      const lightboxPrev = lightbox.querySelector('.lightbox-prev');
      const lightboxNext = lightbox.querySelector('.lightbox-next');
      const lightboxCount = lightbox.querySelector('.lightbox-count');

      let currentFilter = 'all';
let visibleItems = [];
      let currentImageIndex = 0;
      let isSwitching = false;

      let isDragging = false;
      let moved = false;
      let startX = 0;
      let startScrollLeft = 0;
      let pressedCard = null;

      let zoomDragging = false;
      let zoomMoved = false;
      let zoomStartX = 0;
      let zoomStartY = 0;
      let zoomStartScrollLeft = 0;
      let zoomStartScrollTop = 0;
      let zoomTargetScrollLeft = 0;
      let zoomTargetScrollTop = 0;
      let zoomScrollRaf = null;
      let zoomLastX = 0;
      let zoomLastY = 0;
      let zoomLastTime = 0;
      let zoomVelocityX = 0;
      let zoomVelocityY = 0;
      let zoomMomentumRaf = null;

      function sendHeight() {
        const height = Math.ceil(
          Math.max(
            document.body.scrollHeight,
            document.documentElement.scrollHeight
          )
        );

        window.parent.postMessage(
          {
            type: 'iroha-face-portfolio-height',
            height: height
          },
          '*'
        );
      }


      function updateFixedOverlayPosition() {
        const isZoomed =
          lightbox.classList.contains('zoom-active') ||
          lightbox.classList.contains('zoom-mode');

        const scrollLeft = isZoomed ? lightbox.scrollLeft : 0;
        const scrollTop = isZoomed ? lightbox.scrollTop : 0;

        lightbox.style.setProperty('--iroha-scroll-left', scrollLeft + 'px');
        lightbox.style.setProperty('--iroha-scroll-top', scrollTop + 'px');
      }

      function getCategoryLabel(category) {
        if (category === 'boing-eye') return '뽀잉눈';
        if (category === 'smile-eye') return '웃는눈 연동';
        if (category === 'facial') return '페이셜';
        if (category === 'detail') return '성형디테일';
        return '';
      }

      function renderPortfolio() {
        visibleItems = portfolioItems.filter(function (item) {
          return currentFilter === 'all' ||
            item.category === currentFilter;
        });

        grid.innerHTML = '';

        if (visibleItems.length === 0) {
          grid.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-icon">🖼️</div>' +
              '<div class="empty-title">등록된 작업물이 없습니다.</div>' +
              '<div class="empty-text">' +
                '사진이 준비되면 이 메뉴에 작업물이 표시됩니다.' +
              '</div>' +
            '</div>';

          sendHeight();
          return;
        }

        visibleItems.forEach(function (item, index) {
          const card = document.createElement('div');
          card.className = item.type === 'youtube'
            ? 'portfolio-card video-card youtube-embed-card'
            : 'portfolio-card';
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.setAttribute(
            'aria-label',
            (item.title || '작업 이미지') + ' 크게 보기'
          );

          if (item.type === 'youtube') {
            const iframe = document.createElement('iframe');
            iframe.src =
              'https://www.youtube.com/embed/' +
              item.youtubeId +
              '?rel=0&modestbranding=1&playsinline=1';
            iframe.title = item.title || 'YouTube video player';
            iframe.loading = 'eager';
            iframe.allow =
              'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
            iframe.allowFullscreen = true;

            card.appendChild(iframe);
            card.setAttribute(
              'aria-label',
              (item.title || '유튜브 영상') + ' 재생'
            );

            grid.appendChild(card);
            return;
          }

          const image = document.createElement('img');
          image.src = item.src;
          image.alt = item.title || '작업 이미지';
          image.loading = index < 2 ? 'eager' : 'lazy';

          const badge = document.createElement('div');
          badge.className = 'portfolio-badge';
          badge.textContent = getCategoryLabel(item.category);

          card.appendChild(image);
          card.appendChild(badge);

          card.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              openLightbox(index);
            }
          });

          grid.appendChild(card);
        });

        sendHeight();
      }

      function stopZoomSmoothScroll() {
        if (zoomScrollRaf !== null) {
          cancelAnimationFrame(zoomScrollRaf);
          zoomScrollRaf = null;
        }
      }

      function runZoomSmoothScroll() {
        const currentLeft = lightbox.scrollLeft;
        const currentTop = lightbox.scrollTop;

        const nextLeft =
          currentLeft + (zoomTargetScrollLeft - currentLeft) * 0.22;

        const nextTop =
          currentTop + (zoomTargetScrollTop - currentTop) * 0.22;

        lightbox.scrollLeft = nextLeft;
        lightbox.scrollTop = nextTop;

        if (
          Math.abs(zoomTargetScrollLeft - nextLeft) > 0.5 ||
          Math.abs(zoomTargetScrollTop - nextTop) > 0.5
        ) {
          zoomScrollRaf = requestAnimationFrame(runZoomSmoothScroll);
        } else {
          lightbox.scrollLeft = zoomTargetScrollLeft;
          lightbox.scrollTop = zoomTargetScrollTop;
          updateFixedOverlayPosition();
          zoomScrollRaf = null;
        }
      }

      function requestZoomSmoothScroll() {
        if (zoomScrollRaf === null) {
          zoomScrollRaf = requestAnimationFrame(runZoomSmoothScroll);
        }
      }

      function stopZoomMomentum() {
        if (zoomMomentumRaf !== null) {
          cancelAnimationFrame(zoomMomentumRaf);
          zoomMomentumRaf = null;
        }
      }

      function runZoomMomentum() {
        if (
          Math.abs(zoomVelocityX) < 0.12 &&
          Math.abs(zoomVelocityY) < 0.12
        ) {
          zoomMomentumRaf = null;
          return;
        }

        lightbox.scrollLeft += zoomVelocityX;
        lightbox.scrollTop += zoomVelocityY;

        updateFixedOverlayPosition();

        zoomVelocityX *= 0.90;
        zoomVelocityY *= 0.90;

        zoomMomentumRaf = requestAnimationFrame(runZoomMomentum);
      }

      function startZoomMomentum() {
        stopZoomSmoothScroll();
        stopZoomMomentum();

        if (
          Math.abs(zoomVelocityX) < 0.8 &&
          Math.abs(zoomVelocityY) < 0.8
        ) {
          return;
        }

        zoomMomentumRaf = requestAnimationFrame(runZoomMomentum);
      }

      function isVideoItem(item) {
        return item && item.type === 'youtube' && item.youtubeId;
      }

      function stopVideo() {
        if (lightboxVideo) {
          lightboxVideo.src = '';
        }
      }

      function showImageMode() {
        lightbox.classList.remove('video-mode');

        if (lightboxVideoWrap) {
          lightboxVideoWrap.setAttribute('hidden', '');
        }

        if (videoFallbackLink) {
          videoFallbackLink.setAttribute('hidden', '');
        }

        stopVideo();
        lightboxImage.hidden = false;
      }

      function showVideoMode(item) {
        resetLightboxZoom();
        lightbox.classList.add('video-mode');

        if (lightboxVideoWrap) {
          lightboxVideoWrap.removeAttribute('hidden');
        }

        lightboxImage.hidden = true;

        if (videoFallbackLink) {
          videoFallbackLink.href = 'https://youtu.be/' + item.youtubeId;
          videoFallbackLink.removeAttribute('hidden');
        }

        if (lightboxVideo) {
          lightboxVideo.src =
            'https://www.youtube.com/embed/' +
            item.youtubeId +
            '?autoplay=1&rel=0&modestbranding=1&playsinline=1';
        }
      }

      function resetLightboxZoom() {
        stopZoomSmoothScroll();
        stopZoomMomentum();

        lightboxImage.classList.remove(
          'zoomed',
          'dragging',
          'slide-enter-left',
          'slide-enter-right'
        );

        lightbox.classList.remove('zoom-active');
        lightbox.scrollTop = 0;
        lightbox.scrollLeft = 0;
        updateFixedOverlayPosition();
        zoomDragging = false;
        zoomMoved = false;
      }

      function updateLightbox(index) {
        currentImageIndex =
          (index + visibleItems.length) % visibleItems.length;

        const item = visibleItems[currentImageIndex];

        lightboxCount.textContent =
          (currentImageIndex + 1) + ' / ' + visibleItems.length;

        if (isVideoItem(item)) {
          showVideoMode(item);
          return;
        }

        showImageMode();
        lightboxImage.src = item.src;
        lightboxImage.alt = item.title || '작업 이미지';
      }

      function moveLightbox(step) {
        if (!visibleItems.length || isSwitching) {
          return;
        }

        isSwitching = true;

        const nextIndex =
          (currentImageIndex + step + visibleItems.length) %
          visibleItems.length;

        resetLightboxZoom();

        const nextItem = visibleItems[nextIndex];
        const preload = new Image();
        let changed = false;

        function changeImage() {
          if (changed) {
            return;
          }

          changed = true;

          const enterClass = step > 0
            ? 'slide-enter-right'
            : 'slide-enter-left';

          updateLightbox(nextIndex);
          lightboxImage.classList.add(enterClass);

          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              lightboxImage.classList.remove(enterClass);

              setTimeout(function () {
                isSwitching = false;
              }, 340);
            });
          });
        }

        preload.onload = changeImage;
        preload.onerror = changeImage;
        preload.src = nextItem.src;

        /*
          다음 이미지를 미리 불러온 뒤 전환합니다.
          잔상처럼 남는 이전 사진 복제본은 사용하지 않습니다.
        */
        setTimeout(changeImage, 700);
      }

      function openLightbox(index) {
        if (!visibleItems.length) return;

        resetLightboxZoom();
        updateLightbox(index);
        lightbox.classList.add('is-opening');
        lightbox.hidden = false;
        document.body.classList.add('lightbox-open');

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            lightbox.classList.remove('is-opening');
          });
        });

        lightboxClose.focus();
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxImage.src = '';
        stopVideo();
        resetLightboxZoom();
        lightbox.classList.remove('is-opening', 'video-mode');

        if (lightboxVideoWrap) {
          lightboxVideoWrap.setAttribute('hidden', '');
        }

        if (videoFallbackLink) {
          videoFallbackLink.setAttribute('hidden', '');
        }

        lightboxImage.hidden = false;
        isSwitching = false;
        lightbox.scrollTop = 0;
        lightbox.scrollLeft = 0;
        updateFixedOverlayPosition();
        document.body.classList.remove('lightbox-open');
      }

      filterButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          currentFilter = button.dataset.filter;

          filterButtons.forEach(function (otherButton) {
            otherButton.classList.toggle(
              'active',
              otherButton === button
            );
          });

          renderPortfolio();
        });
      });

      grid.addEventListener('pointerdown', function (event) {
        if (event.pointerType === 'mouse' && event.button !== 0) {
          return;
        }

        isDragging = true;
        moved = false;
        pressedCard = event.target.closest('.portfolio-card');
        startX = event.clientX;
        startScrollLeft = grid.scrollLeft;
      });

      grid.addEventListener('pointermove', function (event) {
        if (!isDragging) return;

        const distance = event.clientX - startX;

        if (!moved && Math.abs(distance) > 5) {
          moved = true;
          grid.classList.add('dragging');

          if (
            event.pointerId !== undefined &&
            !grid.hasPointerCapture(event.pointerId)
          ) {
            grid.setPointerCapture(event.pointerId);
          }
        }

        if (moved) {
          grid.scrollLeft = startScrollLeft - distance;
          event.preventDefault();
        }
      });

      function finishPointer(event, openWhenClicked) {
        if (!isDragging) return;

        const cardToOpen = !moved && openWhenClicked
          ? pressedCard
          : null;

        isDragging = false;
        moved = false;
        pressedCard = null;
        grid.classList.remove('dragging');

        if (
          event &&
          event.pointerId !== undefined &&
          grid.hasPointerCapture(event.pointerId)
        ) {
          grid.releasePointerCapture(event.pointerId);
        }

        if (cardToOpen) {
          if (cardToOpen.classList.contains('youtube-embed-card')) {
            return;
          }

          const cards = Array.from(
            grid.querySelectorAll('.portfolio-card')
          );
          const index = cards.indexOf(cardToOpen);

          if (index !== -1) {
            openLightbox(index);
          }
        }
      }

      grid.addEventListener('pointerup', function (event) {
        finishPointer(event, true);
      });

      grid.addEventListener('pointercancel', function (event) {
        finishPointer(event, false);
      });

      grid.addEventListener('lostpointercapture', function (event) {
        finishPointer(event, false);
      });


      lightbox.addEventListener(
        'scroll',
        updateFixedOverlayPosition,
        { passive: true }
      );

      lightboxClose.addEventListener('click', closeLightbox);

      lightboxPrev.addEventListener('click', function () {
        moveLightbox(-1);
      });

      lightboxNext.addEventListener('click', function () {
        moveLightbox(1);
      });

      lightboxImage.addEventListener('pointerdown', function (event) {
        event.stopPropagation();

        if (!lightboxImage.classList.contains('zoomed')) {
          lightboxImage.classList.add('zoomed');
          lightbox.classList.add('zoom-active');

          requestAnimationFrame(function () {
            lightbox.scrollLeft =
              Math.max(
                0,
                (lightbox.scrollWidth - lightbox.clientWidth) / 2
              );

            lightbox.scrollTop =
              Math.max(
                0,
                (lightbox.scrollHeight - lightbox.clientHeight) / 2
              );

            updateFixedOverlayPosition();

            zoomTargetScrollLeft = lightbox.scrollLeft;
            zoomTargetScrollTop = lightbox.scrollTop;
          });

          return;
        }

        if (event.pointerType === 'mouse' && event.button !== 0) {
          return;
        }

        stopZoomSmoothScroll();
        stopZoomSmoothScroll();
        stopZoomMomentum();

        zoomDragging = true;
        zoomMoved = false;
        zoomStartX = event.clientX;
        zoomStartY = event.clientY;
        zoomStartScrollLeft = lightbox.scrollLeft;
        zoomStartScrollTop = lightbox.scrollTop;
        zoomTargetScrollLeft = zoomStartScrollLeft;
        zoomTargetScrollTop = zoomStartScrollTop;
        zoomLastX = event.clientX;
        zoomLastY = event.clientY;
        zoomLastTime = performance.now();
        zoomVelocityX = 0;
        zoomVelocityY = 0;

        lightboxImage.classList.add('dragging');

        if (
          event.pointerId !== undefined &&
          !lightboxImage.hasPointerCapture(event.pointerId)
        ) {
          lightboxImage.setPointerCapture(event.pointerId);
        }
      });

      lightboxImage.addEventListener('pointermove', function (event) {
        if (!zoomDragging) {
          return;
        }

        const distanceX = event.clientX - zoomStartX;
        const distanceY = event.clientY - zoomStartY;

        if (
          !zoomMoved &&
          (
            Math.abs(distanceX) > 1 ||
            Math.abs(distanceY) > 1
          )
        ) {
          zoomMoved = true;
        }

        if (zoomMoved) {
          const now = performance.now();
          const deltaX = event.clientX - zoomLastX;
          const deltaY = event.clientY - zoomLastY;
          const deltaTime = Math.max(8, now - zoomLastTime);
          const velocityScale = Math.min(1.1, 16 / deltaTime) * 0.16;

          zoomVelocityX = -deltaX * velocityScale;
          zoomVelocityY = -deltaY * velocityScale;

          zoomTargetScrollLeft = zoomStartScrollLeft - (distanceX * 1.45);
          zoomTargetScrollTop = zoomStartScrollTop - (distanceY * 1.45);

          requestZoomSmoothScroll();

          zoomLastX = event.clientX;
          zoomLastY = event.clientY;
          zoomLastTime = now;

          event.preventDefault();
        }
      });

      function finishZoomDrag(event, allowClickToggle) {
        if (!zoomDragging) {
          return;
        }

        const shouldZoomOut =
          allowClickToggle &&
          !zoomMoved;

        zoomDragging = false;
        lightboxImage.classList.remove('dragging');

        if (
          event &&
          event.pointerId !== undefined &&
          lightboxImage.hasPointerCapture(event.pointerId)
        ) {
          lightboxImage.releasePointerCapture(event.pointerId);
        }

        if (shouldZoomOut) {
          stopZoomSmoothScroll();
          stopZoomMomentum();
          lightboxImage.classList.remove('zoomed');
          lightbox.classList.remove('zoom-active');

          lightbox.scrollTo({
            top: 0,
            left: 0,
            behavior: 'smooth'
          });
        } else if (zoomMoved) {
          startZoomMomentum();
        }

        zoomMoved = false;
      }

      lightboxImage.addEventListener('pointerup', function (event) {
        finishZoomDrag(event, true);
      });

      lightboxImage.addEventListener('pointercancel', function (event) {
        finishZoomDrag(event, false);
      });

      lightboxImage.addEventListener(
        'lostpointercapture',
        function (event) {
          finishZoomDrag(event, false);
        }
      );

      lightbox.addEventListener('click', function (event) {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener('keydown', function (event) {
        if (lightbox.hidden) return;

        if (event.key === 'Escape') {
          closeLightbox();
        } else if (event.key === 'ArrowLeft') {
          moveLightbox(-1);
        } else if (event.key === 'ArrowRight') {
          moveLightbox(1);
        }
      });

      window.addEventListener('load', function () {
        renderPortfolio();
        sendHeight();
        setTimeout(sendHeight, 250);
        setTimeout(sendHeight, 800);
      });

      window.addEventListener('resize', sendHeight);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(sendHeight);
      }

      if ('ResizeObserver' in window) {
        const observer = new ResizeObserver(sendHeight);
        observer.observe(document.body);
      }
    })();
  </script>
</body>
</html>
